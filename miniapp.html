<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>LSRC — Only Humans</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa;
            color: #27272a;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Flow screen: single screen that transforms */
        .flow {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.6s ease;
        }

        .flow.fading { opacity: 0; }

        .score-display {
            font-size: 20px;
            font-style: italic;
            color: #52525b;
            line-height: 1.5;
            margin-bottom: 16px;
            padding: 0 12px;
            max-width: 360px;
        }

        .score-meta {
            font-size: 13px;
            color: #a1a1aa;
            margin-bottom: 8px;
        }

        .listen-count {
            font-size: 12px;
            color: #d4d4d8;
            margin-bottom: 32px;
        }

        .phase-label {
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            color: #a1a1aa;
            margin-bottom: 24px;
            transition: opacity 0.4s ease;
        }

        .btn-listen {
            background: #18181b;
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 50px;
            font-size: 16px;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-listen:hover { background: #3f3f46; }
        .btn-listen:active { transform: scale(0.97); }

        .btn-soft {
            background: transparent;
            color: #71717a;
            border: 1px solid #e4e4e7;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 6px;
        }

        .btn-soft:hover { background: #f4f4f5; border-color: #a1a1aa; }

        /* Recording pulse */
        .recording-indicator {
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        /* Soft timer ring */
        .timer-ring {
            width: 120px;
            height: 120px;
            margin: 24px auto;
            position: relative;
        }

        .timer-ring svg {
            transform: rotate(-90deg);
            width: 120px;
            height: 120px;
        }

        .timer-ring .bg { stroke: #e4e4e7; }
        .timer-ring .progress {
            stroke: #18181b;
            transition: stroke-dashoffset 0.5s linear;
        }

        .timer-seconds {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: 300;
            color: #52525b;
        }

        /* Audio playback */
        .audio-playback {
            width: 100%;
            max-width: 300px;
            margin: 16px auto;
        }

        .audio-playback audio {
            width: 100%;
            height: 40px;
        }

        /* Text inputs */
        .flow-input {
            width: 100%;
            max-width: 320px;
            padding: 14px 16px;
            border: 1px solid #e4e4e7;
            border-radius: 16px;
            font-family: inherit;
            font-size: 16px;
            text-align: center;
            background: white;
            outline: none;
            transition: border-color 0.2s;
        }

        .flow-input:focus { border-color: #a1a1aa; }

        .flow-textarea {
            width: 100%;
            max-width: 320px;
            padding: 14px 16px;
            border: 1px solid #e4e4e7;
            border-radius: 16px;
            font-family: inherit;
            font-size: 15px;
            text-align: center;
            background: white;
            outline: none;
            resize: none;
            min-height: 80px;
            transition: border-color 0.2s;
        }

        .flow-textarea:focus { border-color: #a1a1aa; }

        /* Done screen transformation display */
        .transformation {
            max-width: 320px;
            margin: 0 auto;
            text-align: left;
        }

        .transformation .arrow {
            text-align: center;
            font-size: 20px;
            color: #d4d4d8;
            margin: 12px 0;
        }

        .transformation .from-score,
        .transformation .to-score {
            font-style: italic;
            padding: 12px 16px;
            border-radius: 12px;
        }

        .transformation .from-score {
            background: #f4f4f5;
            color: #71717a;
            font-size: 14px;
        }

        .transformation .to-score {
            background: #18181b;
            color: white;
            font-size: 16px;
            font-weight: 500;
        }

        /* Archive */
        .archive-section {
            margin-top: auto;
            padding-top: 32px;
            border-top: 1px solid #f4f4f5;
        }

        .archive-toggle {
            font-size: 13px;
            color: #a1a1aa;
            cursor: pointer;
            text-align: center;
            padding: 12px;
            letter-spacing: 0.05em;
        }

        .archive-toggle:hover { color: #52525b; }

        .archive-list { margin-top: 12px; }

        .archive-item {
            background: white;
            border: 1px solid #f4f4f5;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .archive-item:hover { border-color: #d4d4d8; }

        .archive-date {
            font-size: 12px;
            color: #a1a1aa;
        }

        .archive-score {
            font-style: italic;
            font-size: 14px;
            color: #52525b;
            margin-top: 4px;
        }

        .archive-your-score {
            font-size: 14px;
            font-weight: 600;
            color: #27272a;
            margin-top: 4px;
        }

        /* Archive detail view */
        .archive-detail {
            text-align: left;
        }

        .archive-detail-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #a1a1aa;
            margin-bottom: 4px;
            margin-top: 16px;
        }

        .archive-detail-label:first-child { margin-top: 0; }

        .archive-detail audio {
            width: 100%;
            height: 36px;
            margin-top: 4px;
        }

        /* Status messages */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #dcfce7;
            color: #166534;
            text-align: center;
            padding: 8px;
            font-size: 13px;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .status-bar.visible { transform: translateY(0); }
        .status-bar.error { background: #fef2f2; color: #dc2626; }

        .hidden { display: none !important; }

        /* Upload fallback (hidden by default, shown only on mic failure) */
        .upload-fallback {
            margin-top: 16px;
        }

        .upload-fallback input[type="file"] {
            font-size: 13px;
            color: #71717a;
        }

        /* Post-session explanation */
        .explain-toggle {
            font-size: 13px;
            color: #a1a1aa;
            cursor: pointer;
            margin-top: 16px;
            transition: color 0.2s;
        }

        .explain-toggle:hover { color: #52525b; }

        .explain-content {
            text-align: left;
            max-width: 340px;
            margin: 16px auto 0;
        }

        .explain-item {
            margin-bottom: 14px;
        }

        .explain-phase {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #a1a1aa;
            margin-bottom: 2px;
        }

        .explain-text {
            font-size: 13px;
            color: #52525b;
            line-height: 1.5;
        }

        /* About page */
        .about-content {
            text-align: left;
            max-width: 360px;
            width: 100%;
        }

        .about-content h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #27272a;
        }

        .about-content p {
            font-size: 14px;
            color: #52525b;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .about-content em {
            color: #71717a;
        }

        .about-section {
            margin-bottom: 24px;
        }

        .about-phase-list {
            list-style: none;
            padding: 0;
        }

        .about-phase-list li {
            padding: 8px 0;
            border-bottom: 1px solid #f4f4f5;
            font-size: 14px;
            color: #52525b;
        }

        .about-phase-list li:last-child { border-bottom: none; }

        .about-phase-name {
            font-weight: 600;
            color: #27272a;
            display: inline-block;
            width: 70px;
        }

        /* Chat UI */
        .chat-container {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            flex: 1;
            max-height: 70vh;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            min-height: 200px;
        }

        .chat-msg {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            max-width: 85%;
        }

        .chat-msg.guide {
            background: #f4f4f5;
            color: #3f3f46;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-msg.user {
            background: #18181b;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .chat-msg.typing {
            color: #a1a1aa;
            font-style: italic;
        }

        .chat-input-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e4e4e7;
            border-radius: 20px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            background: white;
        }

        .chat-input:focus { border-color: #a1a1aa; }

        .chat-send {
            background: #18181b;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-send:hover { background: #3f3f46; }

        /* About link in bottom bar */
        .bottom-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .bottom-link {
            font-size: 13px;
            color: #a1a1aa;
            cursor: pointer;
            padding: 12px;
            letter-spacing: 0.05em;
        }

        .bottom-link:hover { color: #52525b; }
    </style>
</head>
<body>
    <div class="app">
        <!-- Status bar for notifications -->
        <div id="statusBar" class="status-bar"></div>

        <!-- Main flow area — single screen that transforms -->
        <div id="flowScreen" class="flow">
            <!-- Content injected by JS based on current phase -->
        </div>

        <!-- Bottom section — archive + about -->
        <div class="archive-section" id="archiveSection">
            <div class="bottom-bar">
                <div class="bottom-link" onclick="toggleArchive()">
                    <span id="archiveToggleText">sound diary</span>
                </div>
                <div class="bottom-link" onclick="goToPhase('about')">about</div>
            </div>
            <div id="archiveList" class="archive-list hidden"></div>
        </div>
    </div>

    <script>
    // =============================================
    // LSRC v2 — Only Humans
    // Single-screen flow: listen → sound → reflect → create
    // =============================================

    let sbClient = null;
    let supabaseConnected = false;
    let appConfig = null;

    let tg = null;
    let inTelegram = false;
    let currentUserId = null;

    let currentPhase = 'home';
    let currentScore = null;
    let currentSession = {
        capsuleId: null,
        fragmentId: null,
        initialScoreId: null,
        listenBlobUrl: null,
        soundBlobUrl: null,
        listenBlob: null,
        soundBlob: null,
        reflectionText: '',
        userScore: '',
    };

    let mediaRecorder = null;
    let chunks = [];
    let isRecording = false;
    let softTimerId = null;
    let timerInterval = null;
    let timerElapsed = 0;
    const SOFT_TIMER_SECONDS = 20;

    let archiveOpen = false;

    // =============================================
    // INIT
    // =============================================

    document.addEventListener('DOMContentLoaded', async () => {
        console.log('🚀 LSRC v2 — 2026-04-17');
        initTelegram();
        await initSupabase();
        await loadScore();
        render();
    });

    function initTelegram() {
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            inTelegram = true;
            currentUserId = tg.initDataUnsafe?.user?.id?.toString() || 'anonymous';
            try {
                tg.ready();
                tg.expand();
                if (tg.setHeaderColor) tg.setHeaderColor('#fafafa');
            } catch (e) {
                console.warn('Telegram init failed:', e);
            }
        } else {
            currentUserId = 'web_user_' + Math.random().toString(36).slice(2, 10);
        }
    }

    async function initSupabase() {
        try {
            appConfig = await initializeConfig();
            const v = validateConfig(appConfig);
            if (!v.isValid) {
                console.error('Config errors:', v.errors);
                return;
            }
            sbClient = window.supabase.createClient(appConfig.SUPABASE.URL, appConfig.SUPABASE.ANON_KEY);
            supabaseConnected = true;
            showStatus('Connected', 'success');
        } catch (e) {
            console.error('Supabase init failed:', e);
        }
    }

    function showStatus(msg, type = 'success') {
        const bar = document.getElementById('statusBar');
        bar.textContent = msg;
        bar.className = 'status-bar visible' + (type === 'error' ? ' error' : '');
        setTimeout(() => { bar.className = 'status-bar'; }, 2500);
    }

    // =============================================
    // SCORE LOADING
    // =============================================

    async function loadScore() {
        if (!supabaseConnected) {
            currentScore = { text: "Walk so silently that the bottoms of your feet become ears.", id: null, created_at: null, usage_count: 0 };
            return;
        }
        try {
            const roll = Math.random() * 100;
            const sourceFilter = roll < 75 ? ['oliveros_original'] : ['user_created', 'community'];
            let { data, error } = await sbClient
                .from('scores')
                .select('*')
                .eq('is_public', true)
                .in('source', sourceFilter)
                .order('usage_count', { ascending: true })
                .limit(10);

            if (error || !data || data.length === 0) {
                const fallback = await sbClient
                    .from('scores')
                    .select('*')
                    .eq('is_public', true)
                    .limit(10);
                data = fallback.data;
            }

            if (data && data.length > 0) {
                currentScore = data[Math.floor(Math.random() * data.length)];
                // Increment usage count
                if (currentScore.id) {
                    sbClient.from('scores').update({ usage_count: (currentScore.usage_count || 0) + 1 }).eq('id', currentScore.id).then(() => {});
                }
            } else {
                currentScore = { text: "Walk so silently that the bottoms of your feet become ears.", id: null };
            }
        } catch (e) {
            console.error('Score load error:', e);
            currentScore = { text: "Walk so silently that the bottoms of your feet become ears.", id: null };
        }
    }

    // =============================================
    // RENDERING — single screen that transforms
    // =============================================

    function render() {
        const flow = document.getElementById('flowScreen');
        flow.classList.add('fading');
        setTimeout(() => {
            flow.innerHTML = renderPhase();
            flow.classList.remove('fading');
        }, 300);
    }

    function renderPhase() {
        switch (currentPhase) {
            case 'home': return renderHome();
            case 'listen': return renderListen();
            case 'playback': return renderPlayback();
            case 'sound': return renderSound();
            case 'reflect': return renderReflect();
            case 'create': return renderCreate();
            case 'done': return renderDone();
            case 'about': return renderAbout();
            case 'guide': return renderGuide();
            case 'archiveDetail': return renderArchiveDetail();
            default: return renderHome();
        }
    }

    function renderHome() {
        const scoreText = currentScore?.text || 'Loading...';
        const daysAgo = currentScore?.created_at ? getDaysAgo(currentScore.created_at) : '';
        const meta = daysAgo ? `Created by a human ${daysAgo}.` : '';
        const listenCount = currentScore?.usage_count > 1 ? `${currentScore.usage_count} people listened to this` : '';

        return `
            <div class="score-display">"${scoreText}"</div>
            ${meta ? `<div class="score-meta">${meta}</div>` : ''}
            ${listenCount ? `<div class="listen-count">${listenCount}</div>` : ''}
            <button class="btn-listen" onclick="startFlow()">Listen</button>
        `;
    }

    function renderListen() {
        return `
            <div class="phase-label">listen...</div>
            ${renderTimerRing()}
            <div style="margin-top: 16px;">
                <span class="recording-indicator"></span>
                <span style="font-size: 13px; color: #71717a;">recording</span>
            </div>
            <div style="margin-top: 24px;">
                <button class="btn-soft" onclick="finishListenPhase()">next →</button>
            </div>
            <div id="listenUploadFallback" class="upload-fallback hidden">
                <input type="file" accept="audio/*" onchange="handleUpload(this, 'listen')">
            </div>
        `;
    }

    function renderPlayback() {
        return `
            <div class="phase-label">hear what you didn't hear</div>
            <div class="audio-playback">
                <audio id="playbackAudio" controls autoplay></audio>
            </div>
            <div style="margin-top: 24px;">
                <button class="btn-listen" onclick="goToPhase('sound')">Sound</button>
            </div>
        `;
    }

    function renderSound() {
        return `
            <div class="phase-label">sound...</div>
            ${renderTimerRing()}
            <div style="margin-top: 16px;">
                <span class="recording-indicator"></span>
                <span style="font-size: 13px; color: #71717a;">your response</span>
            </div>
            <div style="margin-top: 24px;">
                <button class="btn-soft" onclick="finishSoundPhase()">next →</button>
            </div>
            <div id="soundUploadFallback" class="upload-fallback hidden">
                <input type="file" accept="audio/*" onchange="handleUpload(this, 'sound')">
            </div>
        `;
    }

    function renderReflect() {
        return `
            <div class="phase-label">reflect</div>
            <textarea class="flow-textarea" id="reflectInput" placeholder="What did you notice?"
                      oninput="currentSession.reflectionText = this.value"></textarea>
            <div style="margin-top: 24px;">
                <button class="btn-listen" onclick="goToPhase('create')">Create</button>
            </div>
            <div style="margin-top: 8px;">
                <button class="btn-soft" onclick="goToPhase('create')">skip</button>
            </div>
        `;
    }

    function renderCreate() {
        return `
            <div class="phase-label">create your score</div>
            <input class="flow-input" id="createInput" placeholder="One line — only you could write"
                   oninput="currentSession.userScore = this.value">
            <div style="margin-top: 24px;">
                <button class="btn-listen" onclick="saveAndFinish()">Save</button>
            </div>
            <div style="margin-top: 8px;">
                <button class="btn-soft" onclick="saveAndFinish()">skip</button>
            </div>
        `;
    }

    function renderDone() {
        const sourceText = currentScore?.text || '';
        const userText = currentSession.userScore || '';

        let content = '';
        if (sourceText && userText) {
            content = `
                <div class="transformation">
                    <div class="from-score">"${sourceText}"</div>
                    <div class="arrow">↓</div>
                    <div class="to-score">"${userText}"</div>
                </div>
                <div style="margin-top: 20px; font-size: 13px; color: #a1a1aa;">
                    Your score joins the flow.<br>Someone will begin where you ended.
                </div>
            `;
        } else {
            content = `
                <div style="font-size: 13px; color: #a1a1aa;">
                    Saved to your sound diary.
                </div>
            `;
        }

        return `
            <div class="phase-label">✧</div>
            ${content}
            <div style="margin-top: 32px;">
                <button class="btn-listen" onclick="startNewSession()">Listen again</button>
            </div>
            <div class="explain-toggle" onclick="toggleExplanation()">
                <span id="explainToggleText">What just happened?</span>
            </div>
            <div id="explainContent" class="explain-content hidden">
                <div class="explain-item">
                    <div class="explain-phase">Listen</div>
                    <div class="explain-text">You recorded the environment around you. This is the core of Deep Listening — Pauline Oliveros' practice of radical attention to all sound, without judgment or selection.</div>
                </div>
                <div class="explain-item">
                    <div class="explain-phase">Playback</div>
                    <div class="explain-text">You listened back to what was recorded. Oliveros emphasized re-listening as a way to notice what you missed — the gap between what you perceived in the moment and what was actually there.</div>
                </div>
                <div class="explain-item">
                    <div class="explain-phase">Sound</div>
                    <div class="explain-text">You responded to the world with your own sound. This is sonic dialogue — a key Deep Listening exercise where you answer the environment, creating a conversation between you and the world.</div>
                </div>
                <div class="explain-item">
                    <div class="explain-phase">Reflect</div>
                    <div class="explain-text">You wrote down what you noticed. Oliveros kept an observation diary throughout her practice. Journaling awareness makes the invisible shifts in perception visible and lasting.</div>
                </div>
                <div class="explain-item">
                    <div class="explain-phase">Create</div>
                    <div class="explain-text">You wrote a score — a text instruction for listening. Oliveros created text scores throughout her life, from <em>Sonic Meditations</em> (1971) to <em>Deep Listening: A Composer's Sound Practice</em>. Your score now enters the shared flow.</div>
                </div>
                <div style="margin-top: 16px; text-align: center;">
                    <button class="btn-soft" onclick="goToPhase('about')">Learn more about LSRC</button>
                </div>
            </div>
        `;
    }

    function toggleExplanation() {
        const content = document.getElementById('explainContent');
        const toggle = document.getElementById('explainToggleText');
        if (content.classList.contains('hidden')) {
            content.classList.remove('hidden');
            toggle.textContent = 'What just happened? ▾';
        } else {
            content.classList.add('hidden');
            toggle.textContent = 'What just happened?';
        }
    }

    function renderAbout() {
        return `
            <div class="about-content">
                <button class="btn-soft" onclick="goToPhase('home')" style="margin-bottom: 20px;">← back</button>

                <div class="about-section">
                    <h2>LSRC</h2>
                    <p>Listen. Sound. Reflect. Create.</p>
                    <p>A micro-practice of deep listening, inspired by the work of composer and philosopher <strong>Pauline Oliveros</strong> (1932–2016).</p>
                </div>

                <div class="about-section">
                    <h2>What is Deep Listening?</h2>
                    <p>Deep Listening is a practice developed by Pauline Oliveros over decades of work as a composer, improviser, and teacher. It goes beyond simply hearing — it's about expanding awareness to include all sounds, internal and external, without preference or judgment.</p>
                    <p><em>"Deep Listening is listening in every possible way to everything possible to hear no matter what you are doing."</em> — Pauline Oliveros</p>
                </div>

                <div class="about-section">
                    <h2>How LSRC connects to the practice</h2>
                    <ul class="about-phase-list">
                        <li><span class="about-phase-name">Listen</span> Record the environment. Oliveros' core practice: radical attention to all sound without selection.</li>
                        <li><span class="about-phase-name">Playback</span> Hear what you missed. Re-listening reveals the gap between perception and reality.</li>
                        <li><span class="about-phase-name">Sound</span> Respond with your voice. Sonic dialogue — answering the world with your own sound.</li>
                        <li><span class="about-phase-name">Reflect</span> Write what you noticed. The observation diary that Oliveros practiced throughout her work.</li>
                        <li><span class="about-phase-name">Create</span> Write a score. Text instructions for listening, as in <em>Sonic Meditations</em> and <em>Deep Listening: A Composer's Sound Practice</em>.</li>
                    </ul>
                </div>

                <div class="about-section">
                    <h2>Only Humans</h2>
                    <p>You take a score written by another human. You pass it through your body, your listening, your life experience — and create something new. No algorithm can do this. Only you.</p>
                    <p>Your score enters the flow. Someone else will begin where you ended. A living chain of human listening.</p>
                </div>

                <div style="text-align: center; margin-top: 8px;">
                    <button class="btn-soft" onclick="goToPhase('guide')">Still have questions? Talk to our guide</button>
                </div>
            </div>
        `;
    }

    // =============================================
    // GUIDE CHAT (AI Assistant)
    // =============================================

    let guideMessages = [];
    let guideThreadId = null;
    let guideLoading = false;

    function renderGuide() {
        let messagesHtml = '';
        if (guideMessages.length === 0) {
            messagesHtml = `
                <div class="chat-msg guide">
                    Welcome. I can tell you more about Deep Listening, Pauline Oliveros, or how this app works. What would you like to know?
                </div>
            `;
        } else {
            messagesHtml = guideMessages.map(m =>
                `<div class="chat-msg ${m.role === 'user' ? 'user' : 'guide'}">${escapeHtml(m.text)}</div>`
            ).join('');
        }

        if (guideLoading) {
            messagesHtml += '<div class="chat-msg guide typing">thinking...</div>';
        }

        return `
            <div style="text-align: left; width: 100%; max-width: 380px;">
                <button class="btn-soft" onclick="goToPhase('about')" style="margin-bottom: 12px;">← back</button>
            </div>
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    ${messagesHtml}
                </div>
                <div class="chat-input-row">
                    <input class="chat-input" id="chatInput" placeholder="Ask about Deep Listening..."
                           onkeydown="if(event.key==='Enter')sendGuideMessage()">
                    <button class="chat-send" onclick="sendGuideMessage()">→</button>
                </div>
            </div>
        `;
    }

    async function sendGuideMessage() {
        const input = document.getElementById('chatInput');
        if (!input) return;
        const text = input.value.trim();
        if (!text || guideLoading) return;

        guideMessages.push({ role: 'user', text });
        input.value = '';
        guideLoading = true;
        render();
        scrollChatToBottom();

        try {
            const resp = await fetch('/api/guide', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: text,
                    thread_id: guideThreadId
                })
            });

            if (!resp.ok) throw new Error('Guide API error');

            const data = await resp.json();
            guideThreadId = data.thread_id || guideThreadId;
            guideMessages.push({ role: 'guide', text: data.reply || 'Sorry, I could not respond.' });
        } catch (e) {
            console.error('Guide chat error:', e);
            guideMessages.push({ role: 'guide', text: 'Something went wrong. Please try again.' });
        }

        guideLoading = false;
        render();
        setTimeout(scrollChatToBottom, 350);
    }

    function scrollChatToBottom() {
        const el = document.getElementById('chatMessages');
        if (el) el.scrollTop = el.scrollHeight;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function renderTimerRing() {
        const circumference = 2 * Math.PI * 52;
        return `
            <div class="timer-ring">
                <svg viewBox="0 0 120 120">
                    <circle class="bg" cx="60" cy="60" r="52" fill="none" stroke-width="4"/>
                    <circle class="progress" id="timerProgress" cx="60" cy="60" r="52" fill="none" stroke-width="4"
                            stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}" stroke-linecap="round"/>
                </svg>
                <div class="timer-seconds" id="timerText">0</div>
            </div>
        `;
    }

    function renderArchiveDetail() {
        if (!window._archiveDetailData) return '<div class="phase-label">Loading...</div>';
        const d = window._archiveDetailData;
        const date = new Date(d.capsule.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

        let html = `
            <div style="text-align: left; width: 100%; max-width: 340px;">
                <button class="btn-soft" onclick="goToPhase('home')" style="margin-bottom: 16px;">← back</button>
                <div class="archive-detail">
                    <div class="archive-detail-label">Date</div>
                    <div style="font-size: 14px; color: #52525b;">${date}</div>
        `;

        if (d.scoreText) {
            html += `
                <div class="archive-detail-label">Source score</div>
                <div style="font-style: italic; color: #52525b;">"${d.scoreText}"</div>
            `;
        }
        if (d.finalScoreText) {
            html += `
                <div class="archive-detail-label">Your score</div>
                <div style="font-weight: 600; color: #27272a;">"${d.finalScoreText}"</div>
            `;
        }
        if (d.reflectionText) {
            html += `
                <div class="archive-detail-label">Reflection</div>
                <div style="color: #71717a;">${d.reflectionText}</div>
            `;
        }
        if (d.listenUrl) {
            html += `
                <div class="archive-detail-label">Listen</div>
                <audio controls src="${d.listenUrl}"></audio>
            `;
        }
        if (d.soundUrl) {
            html += `
                <div class="archive-detail-label">Sound</div>
                <audio controls src="${d.soundUrl}"></audio>
            `;
        }
        html += `</div></div>`;
        return html;
    }

    // =============================================
    // FLOW LOGIC
    // =============================================

    async function startFlow() {
        // Request mic early
        try {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                await navigator.mediaDevices.getUserMedia({ audio: true });
            }
        } catch (e) {
            console.warn('Mic pre-request failed:', e);
        }

        await loadScore();
        currentSession = {
            capsuleId: null, fragmentId: null, initialScoreId: currentScore?.id || null,
            listenBlobUrl: null, soundBlobUrl: null, listenBlob: null, soundBlob: null,
            reflectionText: '', userScore: '',
        };

        // Create capsule + fragment in DB
        if (supabaseConnected && currentScore?.id) {
            try {
                const { data: cap } = await sbClient.from('capsules').insert({
                    user_id: currentUserId || 'anonymous',
                    initial_score_id: currentScore.id,
                    is_public: true
                }).select().single();
                if (cap) currentSession.capsuleId = cap.id;

                const { data: frag } = await sbClient.from('fragments').insert({
                    capsule_id: currentSession.capsuleId,
                    cycle_number: 1,
                    listen_source: 'environment'
                }).select().single();
                if (frag) currentSession.fragmentId = frag.id;
            } catch (e) {
                console.error('DB session create error:', e);
            }
        }

        goToPhase('listen');
        setTimeout(() => startRecordingAuto('listen'), 400);
    }

    function goToPhase(phase) {
        currentPhase = phase;
        render();

        // Set up playback audio after render
        if (phase === 'playback' && currentSession.listenBlobUrl) {
            setTimeout(() => {
                const audio = document.getElementById('playbackAudio');
                if (audio) audio.src = currentSession.listenBlobUrl;
            }, 350);
        }
    }

    async function finishListenPhase() {
        stopCurrentRecording();
        // Small delay to let onstop handler complete
        setTimeout(() => goToPhase('playback'), 500);
    }

    async function finishSoundPhase() {
        stopCurrentRecording();
        setTimeout(() => goToPhase('reflect'), 500);
    }

    async function saveAndFinish() {
        const userScore = currentSession.userScore?.trim() || '';
        const reflectionText = currentSession.reflectionText?.trim() || '';

        if (supabaseConnected && currentSession.capsuleId) {
            try {
                let finalScoreId = null;
                if (userScore) {
                    const { data: scoreData } = await sbClient.from('scores').insert({
                        text: userScore,
                        author_user_id: currentUserId,
                        source: 'user_created',
                        is_public: true,
                        parent_score_id: currentScore?.id || null
                    }).select().single();
                    if (scoreData) finalScoreId = scoreData.id;
                }

                await sbClient.from('capsules').update({
                    final_score_id: finalScoreId,
                    is_public: true,
                    transport: inTelegram ? 'telegram_webapp' : 'web'
                }).eq('id', currentSession.capsuleId);

                if (currentSession.fragmentId && reflectionText) {
                    await sbClient.from('reflections').insert({
                        fragment_id: currentSession.fragmentId,
                        text: reflectionText,
                        transcription_source: 'user_typed'
                    });
                }
            } catch (e) {
                console.error('Save error:', e);
            }
        }

        if (tg && typeof tg.sendData === 'function') {
            try {
                tg.sendData(JSON.stringify({ t: 'capsule_saved', score: userScore }));
            } catch (e) {}
        }

        goToPhase('done');
    }

    async function startNewSession() {
        currentPhase = 'home';
        await loadScore();
        render();
    }

    // =============================================
    // RECORDING with soft timer
    // =============================================

    async function startRecordingAuto(type) {
        try {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                throw new Error('MediaRecorder not supported');
            }

            const stream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: false, noiseSuppression: false, sampleRate: 44100 }
            });

            let mimeType = 'audio/webm;codecs=opus';
            if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'audio/webm';
            if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'audio/mp4';

            mediaRecorder = new MediaRecorder(stream, { mimeType });
            chunks = [];

            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

            mediaRecorder.onstop = async () => {
                stream.getTracks().forEach(t => t.stop());
                const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
                const blobUrl = URL.createObjectURL(blob);

                if (type === 'listen') {
                    currentSession.listenBlob = blob;
                    currentSession.listenBlobUrl = blobUrl;
                } else {
                    currentSession.soundBlob = blob;
                    currentSession.soundBlobUrl = blobUrl;
                }

                // Save to Supabase in background
                saveAudioAsync(blob, type);
            };

            mediaRecorder.start(1000);
            isRecording = true;
            startSoftTimer();

        } catch (e) {
            console.warn('Recording failed:', e);
            // Show upload fallback
            const fallback = document.getElementById(type + 'UploadFallback');
            if (fallback) fallback.classList.remove('hidden');
        }
    }

    function stopCurrentRecording() {
        clearSoftTimer();
        if (mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
        }
    }

    function startSoftTimer() {
        timerElapsed = 0;
        const circumference = 2 * Math.PI * 52;
        timerInterval = setInterval(() => {
            timerElapsed++;
            const progress = document.getElementById('timerProgress');
            const text = document.getElementById('timerText');
            if (progress) {
                const offset = circumference - (timerElapsed / SOFT_TIMER_SECONDS) * circumference;
                progress.setAttribute('stroke-dashoffset', Math.max(offset, 0));
            }
            if (text) text.textContent = timerElapsed;

            if (timerElapsed === SOFT_TIMER_SECONDS) {
                // Soft signal — subtle vibration if available
                if (navigator.vibrate) navigator.vibrate(100);
                clearInterval(timerInterval);
            }
        }, 1000);
    }

    function clearSoftTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        timerElapsed = 0;
    }

    // =============================================
    // AUDIO SAVE (background, non-blocking)
    // =============================================

    async function saveAudioAsync(blob, type) {
        if (!sbClient || !supabaseConnected) return;

        try {
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            const userId = tg?.initDataUnsafe?.user?.id || 'anonymous';
            const ct = blob.type && blob.type !== '' ? blob.type.replace('video/', 'audio/') : 'audio/webm';
            const ext = ct.includes('mp4') || ct.includes('m4a') ? 'mp4' : 'webm';
            const fileName = `${type}_${userId}_${timestamp}.${ext}`;
            const filePath = `audio/${fileName}`;

            await sbClient.storage.from('audio').upload(filePath, blob, { contentType: ct, upsert: false });

            const publicUrl = `${appConfig.SUPABASE.URL}/storage/v1/object/public/audio/${filePath}`;

            const { data: dbData } = await sbClient.from('audio_files').insert({
                file_name: fileName, file_path: filePath, file_url: publicUrl,
                file_size: blob.size, mime_type: blob.type, user_id: userId
            }).select().single();

            if (dbData?.id && currentSession.fragmentId) {
                const updateData = {};
                if (type === 'listen') updateData.listen_audio_id = dbData.id;
                else updateData.sound_audio_id = dbData.id;
                await sbClient.from('fragments').update(updateData).eq('id', currentSession.fragmentId);
            }
        } catch (e) {
            console.error('Audio save error:', e);
        }
    }

    // =============================================
    // UPLOAD FALLBACK
    // =============================================

    function handleUpload(input, type) {
        const file = input.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        if (type === 'listen') {
            currentSession.listenBlob = file;
            currentSession.listenBlobUrl = url;
        } else {
            currentSession.soundBlob = file;
            currentSession.soundBlobUrl = url;
        }
        saveAudioAsync(file, type);
        if (type === 'listen') finishListenPhase();
        else finishSoundPhase();
    }

    // =============================================
    // ARCHIVE (Sound Diary)
    // =============================================

    function toggleArchive() {
        archiveOpen = !archiveOpen;
        const list = document.getElementById('archiveList');
        const text = document.getElementById('archiveToggleText');
        if (archiveOpen) {
            list.classList.remove('hidden');
            text.textContent = 'sound diary ▾';
            loadArchive();
        } else {
            list.classList.add('hidden');
            text.textContent = 'sound diary';
        }
    }

    async function loadArchive() {
        const list = document.getElementById('archiveList');
        list.innerHTML = '<div style="text-align:center; color:#a1a1aa; font-size:13px; padding:16px;">Loading...</div>';

        if (!supabaseConnected) {
            list.innerHTML = '<div style="text-align:center; color:#a1a1aa; font-size:13px; padding:16px;">Not connected</div>';
            return;
        }

        try {
            const { data: capsules } = await sbClient.from('capsules')
                .select('id, created_at, initial_score_id, final_score_id')
                .eq('user_id', currentUserId)
                .order('created_at', { ascending: false })
                .limit(30);

            if (!capsules || capsules.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#a1a1aa; font-size:13px; padding:16px;">No entries yet</div>';
                return;
            }

            // Get fragments to check which have audio
            const capIds = capsules.map(c => c.id);
            const { data: frags } = await sbClient.from('fragments')
                .select('capsule_id, listen_audio_id, sound_audio_id')
                .in('capsule_id', capIds);

            const capsWithAudio = new Set();
            (frags || []).forEach(f => {
                if (f.listen_audio_id || f.sound_audio_id) capsWithAudio.add(f.capsule_id);
            });

            const scoreIds = [...new Set([
                ...capsules.map(c => c.initial_score_id),
                ...capsules.map(c => c.final_score_id)
            ].filter(Boolean))];

            let scoreLookup = {};
            if (scoreIds.length > 0) {
                const { data: scores } = await sbClient.from('scores').select('id, text').in('id', scoreIds);
                if (scores) scores.forEach(s => scoreLookup[s.id] = s.text);
            }

            const filtered = capsules.filter(c => capsWithAudio.has(c.id));
            if (filtered.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#a1a1aa; font-size:13px; padding:16px;">No entries with audio yet</div>';
                return;
            }

            list.innerHTML = filtered.map(c => {
                const date = new Date(c.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const initial = scoreLookup[c.initial_score_id] || '';
                const final_ = scoreLookup[c.final_score_id] || '';
                return `
                    <div class="archive-item" onclick="openArchiveDetail('${c.id}')">
                        <div class="archive-date">${date}</div>
                        ${initial ? `<div class="archive-score">"${initial.substring(0, 50)}${initial.length > 50 ? '...' : ''}"</div>` : ''}
                        ${final_ ? `<div class="archive-your-score">→ "${final_.substring(0, 50)}${final_.length > 50 ? '...' : ''}"</div>` : ''}
                    </div>
                `;
            }).join('');

        } catch (e) {
            console.error('Archive load error:', e);
            list.innerHTML = '<div style="text-align:center; color:#dc2626; font-size:13px; padding:16px;">Failed to load</div>';
        }
    }

    async function openArchiveDetail(capsuleId) {
        if (!supabaseConnected) return;
        try {
            const { data: capsule } = await sbClient.from('capsules')
                .select('id, created_at, initial_score_id, final_score_id')
                .eq('id', capsuleId).single();

            let scoreText = '', finalScoreText = '';
            const sIds = [capsule.initial_score_id, capsule.final_score_id].filter(Boolean);
            if (sIds.length > 0) {
                const { data: scores } = await sbClient.from('scores').select('id, text').in('id', sIds);
                if (scores) {
                    const ini = scores.find(s => s.id === capsule.initial_score_id);
                    const fin = scores.find(s => s.id === capsule.final_score_id);
                    if (ini) scoreText = ini.text;
                    if (fin) finalScoreText = fin.text;
                }
            }

            const { data: frags } = await sbClient.from('fragments')
                .select('id, listen_audio_id, sound_audio_id')
                .eq('capsule_id', capsuleId).limit(1);

            let listenUrl = null, soundUrl = null, reflectionText = '';
            if (frags && frags.length > 0) {
                const f = frags[0];
                const audioIds = [f.listen_audio_id, f.sound_audio_id].filter(Boolean);
                if (audioIds.length > 0) {
                    const { data: audios } = await sbClient.from('audio_files').select('id, file_url').in('id', audioIds);
                    if (audios) {
                        const la = audios.find(a => a.id === f.listen_audio_id);
                        const sa = audios.find(a => a.id === f.sound_audio_id);
                        if (la) listenUrl = la.file_url;
                        if (sa) soundUrl = sa.file_url;
                    }
                }
                const { data: refs } = await sbClient.from('reflections').select('text').eq('fragment_id', f.id).limit(1);
                if (refs && refs.length > 0) reflectionText = refs[0].text;
            }

            window._archiveDetailData = { capsule, scoreText, finalScoreText, reflectionText, listenUrl, soundUrl };
            goToPhase('archiveDetail');
        } catch (e) {
            console.error('Archive detail error:', e);
        }
    }

    // =============================================
    // UTILS
    // =============================================

    function getDaysAgo(dateStr) {
        if (!dateStr) return '';
        const diff = Date.now() - new Date(dateStr).getTime();
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        if (days === 0) return 'today';
        if (days === 1) return 'yesterday';
        return `${days} days ago`;
    }
